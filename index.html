<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <title>テトリス盤面シミュレーター</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d6dbe7;
      --text: #1f2937;
      --muted: #6b7280;

      --i: #22d3ee;
      --o: #facc15;
      --t: #c084fc;
      --s: #4ade80;
      --z: #f87171;
      --j: #60a5fa;
      --l: #fb923c;

      --manual: #6b7280;
      --cell: #ffffff;
      --boardBg: #e9edf5;
      --gridLine: #cfd7e4;

      --cell-size: 28px;
      --cell-gap: 2px;
      --toolbar-height: 150px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overscroll-behavior: none;
    }

    body {
      padding-bottom: calc(var(--toolbar-height) + env(safe-area-inset-bottom) + 8px);
      touch-action: manipulation;
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 10px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .lead {
      margin: 6px 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.04);
    }

    .topbar {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .piece-preview {
      display: inline-grid;
      gap: 2px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fafc;
      min-width: 68px;
      min-height: 68px;
      align-content: center;
      justify-content: center;
    }

    .piece-row {
      display: flex;
      gap: 2px;
    }

    .piece-cell {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid #dbe2ee;
      background: white;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .pill {
      padding: 5px 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .pill strong {
      color: var(--text);
    }

    .message {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin: 0 0 8px;
      min-height: 32px;
    }

    .board-wrap {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      justify-content: center;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, var(--cell-size));
      gap: var(--cell-gap);
      padding: 8px;
      border-radius: 14px;
      background: var(--boardBg);
      width: fit-content;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: 1px solid var(--gridLine);
      border-radius: 4px;
      background: var(--cell);
      display: block;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, filter 0.12s ease;
    }

    .manual { background: var(--manual); }

    .i { background: var(--i); }
    .o { background: var(--o); }
    .t { background: var(--t); }
    .s { background: var(--s); }
    .z { background: var(--z); }
    .j { background: var(--j); }
    .l { background: var(--l); }

    .ghost-i,
    .ghost-o,
    .ghost-t,
    .ghost-s,
    .ghost-z,
    .ghost-j,
    .ghost-l {
      background: #ffffff;
      opacity: 1;
      border-width: 3px;
      box-sizing: border-box;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.95);
    }

    .ghost-i { border-color: var(--i); }
    .ghost-o { border-color: var(--o); }
    .ghost-t { border-color: var(--t); }
    .ghost-s { border-color: var(--s); }
    .ghost-z { border-color: var(--z); }
    .ghost-j { border-color: var(--j); }
    .ghost-l { border-color: var(--l); }

    .clearing {
      animation: clearFlash 260ms ease-in-out 2;
      box-shadow: 0 0 14px rgba(255,255,255,0.95);
      filter: brightness(2.25);
      position: relative;
      z-index: 2;
    }

    .dropping {
      animation: dropBounce 220ms ease-out;
    }

    @keyframes clearFlash {
      0% { filter: brightness(1); transform: scale(1); opacity: 1; }
      35% { filter: brightness(2.8); transform: scale(1.06); opacity: 1; }
      70% { filter: brightness(1.5); transform: scale(0.98); opacity: 0.45; }
      100% { filter: brightness(0.8); transform: scale(0.92); opacity: 0; }
    }

    @keyframes dropBounce {
      0% { transform: translateY(-10px); }
      70% { transform: translateY(2px); }
      100% { transform: translateY(0); }
    }

    details {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }

    summary {
      cursor: pointer;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      list-style: none;
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .details-body {
      border-top: 1px solid var(--line);
      padding: 10px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      min-height: 42px;
      touch-action: manipulation;
    }

    button.active {
      background: #111827;
      color: #fff;
      border-color: #111827;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      resize: vertical;
      margin-top: 10px;
    }

    .small {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.55;
      margin-top: 8px;
    }

    .mobile-toolbar {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: max(8px, env(safe-area-inset-bottom));
      display: grid;
      gap: 8px;
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .toolbar-row {
      display: grid;
      gap: 8px;
    }

    .row-3 { grid-template-columns: repeat(3, 1fr); }
    .row-4 { grid-template-columns: repeat(4, 1fr); }
    .row-7 { grid-template-columns: repeat(7, 1fr); }

    .mobile-toolbar button {
      min-height: 40px;
      font-size: 12px;
      padding: 8px 6px;
    }

    .piece-mini {
      font-weight: 700;
    }

    @media (min-width: 901px) {
      :root {
        --cell-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>テトリス盤面シミュレーター</h1>
    <p class="lead">
      PCは盤面クリックで即落下。スマホは下の固定バーで移動・回転・落下します。
    </p>

    <div class="card">
      <div class="topbar">
        <div id="piecePreview" class="piece-preview"></div>
        <div class="meta">
          <div class="pill">ピース: <strong id="currentPieceLabel">T</strong></div>
          <div class="pill">向き: <strong id="rotationLabel">0°</strong></div>
          <div class="pill">列: <strong id="currentColLabel">4</strong></div>
          <div class="pill">モード: <strong id="modeLabel">落下</strong></div>
          <div class="pill">消去: <strong id="linesCount">0</strong></div>
          <div class="pill">操作: <strong id="moveCount">0</strong></div>
        </div>
      </div>

      <p class="message" id="message">
        PCはマウス移動で位置確認、クリックで即落下。スマホは下の操作バーで動かせます。
      </p>

      <div class="board-wrap">
        <div class="board" id="board"></div>
      </div>

      <details>
        <summary>詳細操作・盤面データ</summary>
        <div class="details-body">
          <div class="buttons">
            <button id="undoBtn" type="button">Undo</button>
            <button id="resetBtn" type="button">Reset</button>
            <button id="copyBtn" type="button">盤面コピー</button>
            <button id="loadBtn" type="button">盤面読み込み</button>
          </div>

          <div class="small">
            PC: 左クリックで落下 / 右クリックでグレー設置 / Shift+クリックで消去<br />
            スマホ: 下部バーで左右移動・回転・落下 / 盤面タップで列指定
          </div>

          <textarea id="boardText" placeholder="0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000
0000000000"></textarea>

          <div class="small">
            読み込んだ 1 はグレーの補助ブロックとして扱います。
          </div>
        </div>
      </details>
    </div>
  </div>

  <div class="mobile-toolbar" id="mobileToolbar">
    <div class="toolbar-row row-3">
      <button id="modeDropBtn" type="button" class="active">落下</button>
      <button id="modePaintBtn" type="button">グレー設置</button>
      <button id="modeEraseBtn" type="button">消す</button>
    </div>

    <div class="toolbar-row row-4">
      <button id="moveLeftBtn" type="button">←</button>
      <button id="rotateBtn" type="button">回転</button>
      <button id="moveRightBtn" type="button">→</button>
      <button id="dropBtn" type="button">落下</button>
    </div>

    <div class="toolbar-row row-7" id="pieceButtons"></div>
  </div>

  <script>
    const ROWS = 20;
    const COLS = 10;
    const CLEAR_ANIMATION_MS = 520;
    const DROP_ANIMATION_MS = 220;
    const HOLD_INITIAL_DELAY = 220;
    const HOLD_REPEAT_MS = 65;
    const MANUAL = "manual";
    const isTouchLike = window.matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;

    const PIECES = {
      I: [[1, 1, 1, 1]],
      O: [[1, 1], [1, 1]],
      T: [[0, 1, 0], [1, 1, 1]],
      S: [[0, 1, 1], [1, 1, 0]],
      Z: [[1, 1, 0], [0, 1, 1]],
      J: [[1, 0, 0], [1, 1, 1]],
      L: [[0, 0, 1], [1, 1, 1]]
    };

    const pieceClassMap = {
      I: "i",
      O: "o",
      T: "t",
      S: "s",
      Z: "z",
      J: "j",
      L: "l"
    };

    const ghostClassMap = {
      I: "ghost-i",
      O: "ghost-o",
      T: "ghost-t",
      S: "ghost-s",
      Z: "ghost-z",
      J: "ghost-j",
      L: "ghost-l"
    };

    let board = makeBoard();
    let history = [];
    let selectedPiece = "T";
    let rotation = 0;
    let currentCol = 3;
    let totalClearedLines = 0;
    let moveCount = 0;
    let isAnimating = false;
    let clearingRows = [];
    let isDropAnimating = false;
    let currentMode = "drop";

    let holdTimeout = null;
    let holdInterval = null;

    const docEl = document.documentElement;
    const boardEl = document.getElementById("board");
    const pieceButtonsEl = document.getElementById("pieceButtons");
    const piecePreviewEl = document.getElementById("piecePreview");
    const rotationLabel = document.getElementById("rotationLabel");
    const messageEl = document.getElementById("message");
    const boardTextEl = document.getElementById("boardText");
    const linesCountEl = document.getElementById("linesCount");
    const moveCountEl = document.getElementById("moveCount");
    const modeLabelEl = document.getElementById("modeLabel");
    const currentPieceLabel = document.getElementById("currentPieceLabel");
    const currentColLabel = document.getElementById("currentColLabel");
    const mobileToolbar = document.getElementById("mobileToolbar");

    const rotateBtn = document.getElementById("rotateBtn");
    const moveLeftBtn = document.getElementById("moveLeftBtn");
    const moveRightBtn = document.getElementById("moveRightBtn");
    const dropBtn = document.getElementById("dropBtn");
    const undoBtn = document.getElementById("undoBtn");
    const resetBtn = document.getElementById("resetBtn");
    const copyBtn = document.getElementById("copyBtn");
    const loadBtn = document.getElementById("loadBtn");

    const modeDropBtn = document.getElementById("modeDropBtn");
    const modePaintBtn = document.getElementById("modePaintBtn");
    const modeEraseBtn = document.getElementById("modeEraseBtn");

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function makeBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function copyBoard(src) {
      return src.map(row => [...row]);
    }

    function rotateMatrix(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function normalizeTop(shape) {
      while (shape.length && shape[0].every(v => v === 0)) shape = shape.slice(1);
      return shape;
    }

    function normalizeLeft(shape) {
      while (shape[0] && shape.every(row => row[0] === 0)) {
        shape = shape.map(row => row.slice(1));
      }
      return shape;
    }

    function rotateNTimes(shape, n) {
      let out = shape.map(r => [...r]);
      for (let i = 0; i < n; i++) out = rotateMatrix(out);
      out = normalizeTop(out);
      out = normalizeLeft(out);
      return out;
    }

    function currentShape() {
      return rotateNTimes(PIECES[selectedPiece], rotation);
    }

    function getMaxColForShape(shape) {
      return COLS - shape[0].length;
    }

    function clampCurrentCol() {
      const shape = currentShape();
      const maxCol = getMaxColForShape(shape);
      if (currentCol < 0) currentCol = 0;
      if (currentCol > maxCol) currentCol = maxCol;
    }

    function pushHistory() {
      history.push({
        board: copyBoard(board),
        totalClearedLines,
        moveCount,
        selectedPiece,
        rotation,
        currentCol
      });
      if (history.length > 100) history.shift();
    }

    function isFilledCell(value) {
      return value !== 0 && value !== null;
    }

    function canPlace(targetBoard, shape, topRow, leftCol) {
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (!shape[r][c]) continue;
          const br = topRow + r;
          const bc = leftCol + c;
          if (bc < 0 || bc >= COLS || br >= ROWS) return false;
          if (br >= 0 && isFilledCell(targetBoard[br][bc])) return false;
        }
      }
      return true;
    }

    function findDropRow(targetBoard, shape, col) {
      let row = -shape.length;
      while (canPlace(targetBoard, shape, row + 1, col)) row++;
      return canPlace(targetBoard, shape, row, col) ? row : null;
    }

    function mergePiece(targetBoard, shape, row, col, value) {
      const next = copyBoard(targetBoard);
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (!shape[r][c]) continue;
          const br = row + r;
          const bc = col + c;
          if (br >= 0 && br < ROWS && bc >= 0 && bc < COLS) {
            next[br][bc] = value;
          }
        }
      }
      return next;
    }

    function getFullRows(targetBoard) {
      const rows = [];
      for (let r = 0; r < ROWS; r++) {
        if (targetBoard[r].every(cell => isFilledCell(cell))) rows.push(r);
      }
      return rows;
    }

    function clearSpecificRows(targetBoard, rowsToClear) {
      const rowSet = new Set(rowsToClear);
      const remain = targetBoard.filter((_, idx) => !rowSet.has(idx));
      const top = Array.from({ length: rowsToClear.length }, () => Array(COLS).fill(0));
      return [...top, ...remain];
    }

    function boardToText(targetBoard) {
      return targetBoard.map(row => row.map(v => (isFilledCell(v) ? 1 : 0)).join("")).join("\n");
    }

    function textToBoard(text) {
      const cleaned = text.trim();
      if (!cleaned) throw new Error("盤面データが空です");
      const lines = cleaned.split(/\n+/).map(v => v.trim());
      if (lines.length !== ROWS) throw new Error(`${ROWS}行必要です`);
      return lines.map(line => {
        if (line.length !== COLS) throw new Error(`各行は${COLS}桁必要です`);
        return [...line].map(ch => (ch === "1" ? MANUAL : 0));
      });
    }

    function setMessage(text) {
      messageEl.textContent = text;
    }

    function setMode(mode) {
      currentMode = mode;
      modeDropBtn.classList.toggle("active", mode === "drop");
      modePaintBtn.classList.toggle("active", mode === "paint");
      modeEraseBtn.classList.toggle("active", mode === "erase");

      const labels = { drop: "落下", paint: "グレー設置", erase: "消す" };
      modeLabelEl.textContent = labels[mode];

      if (mode === "drop") {
        setMessage(isTouchLike
          ? "スマホでは下の左右移動・回転・落下で操作します。盤面タップで列指定もできます。"
          : "PCではマウス移動で位置を見て、クリックで即落下します。");
      } else if (mode === "paint") {
        setMessage("盤面クリック/タップでグレーの補助ブロックを置けます。");
      } else {
        setMessage("盤面クリック/タップで1マス消せます。");
      }

      renderBoard();
    }

    function renderPieceButtons() {
      pieceButtonsEl.innerHTML = "";
      Object.keys(PIECES).forEach(piece => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = piece;
        btn.classList.add("piece-mini");
        if (piece === selectedPiece) btn.classList.add("active");
        btn.addEventListener("click", () => {
          if (isAnimating) return;
          selectedPiece = piece;
          rotation = 0;
          clampCurrentCol();
          renderAll();
        });
        pieceButtonsEl.appendChild(btn);
      });
    }

    function renderPiecePreview() {
      const shape = currentShape();
      const wrap = document.createElement("div");
      wrap.className = "piece-preview";

      shape.forEach(row => {
        const rowEl = document.createElement("div");
        rowEl.className = "piece-row";
        row.forEach(cell => {
          const cellEl = document.createElement("div");
          cellEl.className = "piece-cell";
          if (cell) cellEl.classList.add(pieceClassMap[selectedPiece]);
          rowEl.appendChild(cellEl);
        });
        wrap.appendChild(rowEl);
      });

      piecePreviewEl.innerHTML = "";
      piecePreviewEl.appendChild(wrap);

      currentPieceLabel.textContent = selectedPiece;
      rotationLabel.textContent = `${rotation * 90}°`;
      currentColLabel.textContent = String(currentCol + 1);
    }

    function paintManualCell(r, c) {
      if (isAnimating) return;
      pushHistory();
      board[r][c] = MANUAL;
      setMessage("そのマスをグレーで塗りました。");
      renderBoard();
    }

    function eraseCell(r, c) {
      if (isAnimating) return;
      if (!isFilledCell(board[r][c])) return;
      pushHistory();
      board[r][c] = 0;
      setMessage("そのマスを消しました。");
      renderBoard();
    }

    async function handleDropAtCol(col) {
      if (isAnimating) return;
      currentCol = col;
      clampCurrentCol();
      await handleDrop();
    }

    async function handleDrop() {
      if (isAnimating) return;

      clampCurrentCol();
      const shape = currentShape();
      const row = findDropRow(board, shape, currentCol);

      if (row === null) {
        setMessage("この位置にはこの向きで置けません。左右移動か回転を試してください。");
        return;
      }

      pushHistory();
      board = mergePiece(board, shape, row, currentCol, selectedPiece);
      moveCount += 1;

      const fullRows = getFullRows(board);
      if (fullRows.length === 0) {
        setMessage(`${selectedPiece} を落としました。`);
        renderBoard();
        return;
      }

      isAnimating = true;
      clearingRows = fullRows;
      setMessage(`${selectedPiece} を落として ${fullRows.length} ライン消去します。`);
      renderBoard();

      await sleep(CLEAR_ANIMATION_MS);

      board = clearSpecificRows(board, fullRows);
      totalClearedLines += fullRows.length;
      clearingRows = [];
      isDropAnimating = true;
      setMessage(`${fullRows.length} ライン消去しました。`);
      renderBoard();

      await sleep(DROP_ANIMATION_MS);

      isDropAnimating = false;
      isAnimating = false;
      renderBoard();
    }

    function getPreviewBoard() {
      if (isAnimating || currentMode !== "drop") return board;

      clampCurrentCol();
      const shape = currentShape();
      const row = findDropRow(board, shape, currentCol);
      if (row === null) return board;
      return mergePiece(board, shape, row, currentCol, `ghost-${selectedPiece}`);
    }

    function getCellClass(value) {
      if (value === 0 || value === null) return "";
      if (value === MANUAL) return "manual";
      if (typeof value === "string" && value.startsWith("ghost-")) {
        const piece = value.replace("ghost-", "");
        return ghostClassMap[piece] || "";
      }
      if (typeof value === "string") return pieceClassMap[value] || "";
      return "";
    }

    function renderBoard() {
      boardEl.innerHTML = "";
      const shown = getPreviewBoard();

      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement("div");
          cell.className = "cell";
          cell.dataset.row = String(r);
          cell.dataset.col = String(c);

          const className = getCellClass(shown[r][c]);
          if (className) cell.classList.add(className);

          if (clearingRows.includes(r) && isFilledCell(shown[r][c])) {
            cell.classList.add("clearing");
          }
          if (isDropAnimating && isFilledCell(shown[r][c])) {
            cell.classList.add("dropping");
          }

          boardEl.appendChild(cell);
        }
      }

      boardTextEl.value = boardToText(board);
      linesCountEl.textContent = String(totalClearedLines);
      moveCountEl.textContent = String(moveCount);
      currentColLabel.textContent = String(currentCol + 1);
    }

    function renderAll() {
      clampCurrentCol();
      renderPieceButtons();
      renderPiecePreview();
      renderBoard();
      fitBoardToViewport();
    }

    function movePiece(delta) {
      if (isAnimating || currentMode !== "drop") return;
      const shape = currentShape();
      const next = currentCol + delta;
      const maxCol = COLS - shape[0].length;
      currentCol = Math.max(0, Math.min(maxCol, next));
      renderAll();
    }

    function rotatePiece() {
      if (isAnimating || currentMode !== "drop") return;
      rotation = (rotation + 1) % 4;
      clampCurrentCol();
      renderAll();
    }

    function stopHoldRepeat() {
      if (holdTimeout) clearTimeout(holdTimeout);
      if (holdInterval) clearInterval(holdInterval);
      holdTimeout = null;
      holdInterval = null;
    }

    function startHoldRepeat(fn) {
      stopHoldRepeat();
      fn();
      holdTimeout = setTimeout(() => {
        holdInterval = setInterval(fn, HOLD_REPEAT_MS);
      }, HOLD_INITIAL_DELAY);
    }

    function bindHoldButton(el, fn) {
      const start = (e) => {
        if (currentMode !== "drop") return;
        e.preventDefault();
        startHoldRepeat(fn);
      };
      const stop = () => stopHoldRepeat();

      el.addEventListener("pointerdown", start);
      el.addEventListener("pointerup", stop);
      el.addEventListener("pointercancel", stop);
      el.addEventListener("pointerleave", stop);
      el.addEventListener("lostpointercapture", stop);
    }

    function fitBoardToViewport() {
      const viewportH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      const viewportW = window.visualViewport ? window.visualViewport.width : window.innerWidth;

      const toolbarRect = mobileToolbar.getBoundingClientRect();
      const toolbarH = toolbarRect.height || 150;
      docEl.style.setProperty("--toolbar-height", `${Math.ceil(toolbarH)}px`);

      const topAreaEstimate = isTouchLike ? 170 : 185;
      const extraSpacing = isTouchLike ? 30 : 24;

      const usableHeight = Math.max(320, viewportH - toolbarH - topAreaEstimate - extraSpacing);
      const usableWidth = Math.max(220, Math.min(viewportW, 980) - 36);

      const sizeByHeight = Math.floor((usableHeight - 8 - (ROWS - 1) * 2) / ROWS);
      const sizeByWidth = Math.floor((usableWidth - 16 - (COLS - 1) * 2) / COLS);

      let nextSize = Math.min(sizeByHeight, sizeByWidth);

      if (isTouchLike) {
        nextSize = Math.max(18, Math.min(30, nextSize));
      } else {
        nextSize = Math.max(20, Math.min(34, nextSize));
      }

      docEl.style.setProperty("--cell-size", `${nextSize}px`);
    }

    rotateBtn.addEventListener("click", rotatePiece);
    bindHoldButton(moveLeftBtn, () => movePiece(-1));
    bindHoldButton(moveRightBtn, () => movePiece(1));
    dropBtn.addEventListener("click", handleDrop);

    undoBtn.addEventListener("click", () => {
      if (isAnimating || !history.length) return;
      const prev = history.pop();
      board = prev.board;
      totalClearedLines = prev.totalClearedLines;
      moveCount = prev.moveCount;
      selectedPiece = prev.selectedPiece;
      rotation = prev.rotation;
      currentCol = prev.currentCol;
      clearingRows = [];
      isDropAnimating = false;
      setMessage("1手戻しました。");
      renderAll();
    });

    resetBtn.addEventListener("click", () => {
      if (isAnimating) return;
      pushHistory();
      board = makeBoard();
      totalClearedLines = 0;
      moveCount = 0;
      clearingRows = [];
      isDropAnimating = false;
      currentCol = 3;
      setMessage("盤面をリセットしました。");
      renderAll();
    });

    copyBtn.addEventListener("click", async () => {
      const text = boardToText(board);
      boardTextEl.value = text;
      try {
        await navigator.clipboard.writeText(text);
        setMessage("盤面データをコピーしました。");
      } catch {
        setMessage("盤面データをテキスト欄に出しました。手動でコピーしてください。");
      }
    });

    loadBtn.addEventListener("click", () => {
      if (isAnimating) return;
      try {
        const parsed = textToBoard(boardTextEl.value);
        pushHistory();
        board = parsed;
        clearingRows = [];
        isDropAnimating = false;
        currentCol = 3;
        setMessage("盤面を読み込みました。読み込んだブロックはグレーです。");
        renderAll();
      } catch (e) {
        setMessage(`読み込み失敗: ${e.message}`);
      }
    });

    modeDropBtn.addEventListener("click", () => setMode("drop"));
    modePaintBtn.addEventListener("click", () => setMode("paint"));
    modeEraseBtn.addEventListener("click", () => setMode("erase"));

    boardEl.addEventListener("mousemove", (e) => {
      if (isAnimating || currentMode !== "drop" || isTouchLike) return;
      const cell = e.target.closest(".cell");
      if (!cell) return;
      const col = Number(cell.dataset.col);
      currentCol = col;
      clampCurrentCol();
      renderAll();
    });

    boardEl.addEventListener("click", async (e) => {
      const cell = e.target.closest(".cell");
      if (!cell) return;

      const r = Number(cell.dataset.row);
      const c = Number(cell.dataset.col);

      if (e.shiftKey) {
        eraseCell(r, c);
        return;
      }

      if (currentMode === "paint") {
        paintManualCell(r, c);
      } else if (currentMode === "erase") {
        eraseCell(r, c);
      } else {
        if (isTouchLike) {
          currentCol = c;
          clampCurrentCol();
          renderAll();
        } else {
          await handleDropAtCol(c);
        }
      }
    });

    boardEl.addEventListener("contextmenu", (e) => {
      const cell = e.target.closest(".cell");
      if (!cell) return;
      e.preventDefault();

      const r = Number(cell.dataset.row);
      const c = Number(cell.dataset.col);

      if (e.shiftKey) {
        eraseCell(r, c);
      } else {
        paintManualCell(r, c);
      }
    });

    document.addEventListener("dblclick", (e) => {
      e.preventDefault();
    }, { passive: false });

    window.addEventListener("resize", fitBoardToViewport);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitBoardToViewport);
    }

    renderAll();
    setMode("drop");
    fitBoardToViewport();
  </script>
</body>
</html>
